name: Sync upstream (NousResearch → main)

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/NousResearch/hermes-agent.git

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Merge fast-forward only
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --ff-only || {
            echo "::warning::upstream/main has diverged — manual merge needed"
            exit 1
          }

      - name: Push to fork main
        run: git push origin main
